<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار كيمياء تحصيلي - القسم الرابع</title>
    <style>
        :root { --bg: #f8fafc; --panel: #ffffff; --light-blue: #e0f2fe; --primary: #0284c7; --success: #16a34a; --danger: #dc2626; --accent: #0369a1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 1000px; margin: 20px auto; background: var(--panel); border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        
        .header-brand { 
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); 
            padding: 25px; 
            text-align: center;
            color: white;
            font-weight: bold;
        }
        .header-brand h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header-brand p { margin: 5px 0 0; font-size: 16px; opacity: 0.9; }

        .welcome-screen { padding: 50px 20px; text-align: center; }
        input[type="text"] { width: 65%; padding: 16px; border: 2px solid #cbd5e1; border-radius: 15px; font-size: 18px; text-align: center; outline: none; margin-bottom: 20px; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--light-blue); }

        .quiz-screen { display: none; padding: 30px; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; font-weight: bold; background: #f1f5f9; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        
        .progress-container { width: 100%; height: 10px; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }

        .q-card { background: #fff; padding: 10px; border-radius: 15px; margin-bottom: 25px; }
        .q-text { font-size: 22px; font-weight: bold; color: #0f172a; line-height: 1.6; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) { .options-grid { grid-template-columns: 1fr; } }
        
        .option { padding: 18px; background: #fff; border: 2px solid #e2e8f0; border-radius: 15px; cursor: pointer; transition: 0.2s; font-size: 18px; text-align: right; }
        .option:hover { border-color: var(--primary); background: #f0f9ff; transform: scale(1.01); }
        .correct { background: var(--success) !important; color: white; border-color: var(--success) !important; }
        .wrong { background: var(--danger) !important; color: white; border-color: var(--danger) !important; }

        .feedback-box { margin-top: 25px; padding: 20px; border-radius: 15px; display: none; border: 2px solid; text-align: center; font-weight: bold; font-size: 18px; }
        .fb-success { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        .fb-danger { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 16px 50px; border-radius: 15px; cursor: pointer; font-size: 19px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: var(--accent); transform: translateY(-2px); }
        #next-btn { background: #334155; display: none; margin-top: 20px; }

        #result-screen { display:none; padding: 30px; }
        .summary-table-container { max-height: 500px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 15px; margin-top: 20px; }
        .summary-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
        .summary-table th, .summary-table td { padding: 12px; border: 1px solid #e2e8f0; text-align: right; }
        .summary-table th { background: #f1f5f9; position: sticky; top: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-brand">
        <h1>اختبار كيمياء تحصيلي تجريبي</h1>
        <p>القسم الرابع: التفاعلات والمعادلات الكيميائية</p>
    </div>

    <div id="start-screen" class="welcome-screen">
        <h2>مرحباً بك أيها المبدع/ة 🧪</h2>
        <p>استعد لاختبار معلوماتك في أنواع التفاعلات، وزن المعادلات، والحساب الكيميائي</p>
        <input type="text" id="student-name" placeholder="أدخل اسمك الثلاثي للبدء">
        <br>
        <button class="btn" onclick="startQuiz()">بدء الاختبار 🚀</button>
    </div>

    <div id="quiz-screen" class="quiz-screen">
        <div class="stats-bar">
            <span>👤 المختبر: <span id="display-name" style="color:var(--primary)"></span></span>
            <span>📝 السؤال: <span id="q-counter"></span></span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="q-card">
            <div class="q-text" id="q-text"></div>
        </div>
        <div class="options-grid" id="options-container"></div>
        <div id="feedback-box" class="feedback-box">
            <span id="fb-title"></span>
        </div>
        <div style="text-align: center;">
            <button id="next-btn" class="btn" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-screen">
        <div style="text-align:center;">
            <h2 id="res-title"></h2>
            <div id="res-score" style="font-size: 38px; font-weight: 900; color: var(--primary); margin: 20px;"></div>
            <p id="res-eval" style="font-size: 18px; color: #64748b;"></p>
        </div>
        <hr style="border:0; border-top:1px solid #e2e8f0; margin: 30px 0;">
        <h3>📊 مراجعة الأداء التفصيلية:</h3>
        <div class="summary-table-container">
            <table class="summary-table">
                <thead>
                    <tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الإجابة الصحيحة</th><th>النتيجة</th></tr>
                </thead>
                <tbody id="summary-body"></tbody>
            </table>
        </div>
        <div style="text-align:center; margin-top:40px;">
            <button class="btn" onclick="location.reload()">محاولة مرة أخرى 🔄</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { "text": "أي التالي من العناصر الكيميائية؟", "options": {"أ": "الماء", "ب": "ملح الطعام", "ج": "الكروم", "د": "الأمونيا"}, "answer": "ج" },
        { "text": "الجسيمات سالبة الشحنة التي تدور حول النواة:", "options": {"أ": "البروتونات", "ب": "النيوترونات", "ج": "الإلكترونات", "د": "البوزيترونات"}, "answer": "ج" },
        { "text": "العدد الذري يمثل عدد البروتونات في:", "options": {"أ": "النواة", "ب": "المدارات", "ج": "المستويات الخارجية", "د": "السحابة الإلكترونية"}, "answer": "أ" },
        { "text": "الذرة متعادلة كهربائياً لأن عدد البروتونات يساوي عدد:", "options": {"أ": "النيوترونات", "ب": "الإلكترونات", "ج": "الأنوية", "د": "الجسيمات المشحونة"}, "answer": "ب" },
        { "text": "كتلة الذرة تتركز في:", "options": {"أ": "الإلكترونات", "ب": "النواة", "ج": "البروتونات", "د": "النيوترونات"}, "answer": "ب" },
        { "text": "جسيمات لها نفس الكتلة وتقريباً متعادلة الشحنة:", "options": {"أ": "البروتونات", "ب": "الإلكترونات", "ج": "النيوترونات", "د": "أشعة ألفا"}, "answer": "ج" },
        { "text": "ذرات لها نفس عدد البروتونات وتختلف في عدد النيوترونات:", "options": {"أ": "الأيونات", "ب": "النظائر", "ج": "الجزيئات", "د": "المركبات"}, "answer": "ب" },
        { "text": "تعتمد هوية العنصر على عدد:", "options": {"أ": "البروتونات", "ب": "النيوترونات", "ج": "الإلكترونات", "د": "الروابط"}, "answer": "أ" },
        { "text": "العدد الكتلي يساوي مجموع عدد البروتونات وعدد:", "options": {"أ": "الإلكترونات", "ب": "النيوترونات", "ج": "النظائر", "د": "المستويات"}, "answer": "ب" },
        { "text": "جسيم لا كتلة له ويحمل كمًا من الطاقة:", "options": {"أ": "البروتون", "ب": "النيوترون", "ج": "الفوتون", "د": "الإلكترون"}, "answer": "ج" },
        { "text": "أصغر كمية من الطاقة يمكن أن تكتسبها الذرة أو تفقدها:", "options": {"أ": "الكم", "ب": "الفوتون", "ج": "الإشعاع", "د": "الطيف"}, "answer": "أ" },
        { "text": "حالة تكون فيها إلكترونات الذرة في أدنى مستويات الطاقة المتاحة:", "options": {"أ": "حالة الاستقرار", "ب": "حالة الإثارة", "ج": "حالة التأين", "د": "حالة الغليان"}, "answer": "أ" },
        { "text": "عندما تنتقل الإلكترونات من مستوى طاقة أعلى إلى مستوى طاقة أقل فإنها:", "options": {"أ": "تمتص طاقة", "ب": "تشع طاقة", "ج": "تتحول لبروتونات", "د": "تفقد كتلتها"}, "answer": "ب" },
        { "text": "طيف الانبعاث الذري لليورانيوم يحتوي على:", "options": {"أ": "خطوط ملونة متصلة", "ب": "خطوط منفصلة", "ج": "لون واحد فقط", "د": "أشعة فوق بنفسجية فقط"}, "answer": "ب" },
        { "text": "مبدأ ينص على أنه لا يمكن معرفة سرعة جسيم ومكانه في الوقت نفسه بدقة:", "options": {"أ": "مبدأ هايزنبرج للشك", "ب": "مبدأ أوفباو", "ج": "مبدأ باولي", "د": "قاعدة هوند"}, "answer": "أ" },
        { "text": "المنطقة ثلاثية الأبعاد التي تصف الموقع المحتمل للإلكترون:", "options": {"أ": "المدار", "ب": "المستوى الرئيسي", "ج": "المجال الذري", "د": "النواة"}, "answer": "ج" },
        { "text": "أقصى عدد من الإلكترونات يستوعبه مستوى الطاقة الثاني:", "options": {"أ": "2", "ب": "8", "ج": "18", "د": "32"}, "answer": "ب" },
        { "text": "شكل المستوى الفرعي (s):", "options": {"أ": "كروي", "ب": "فصي", "ج": "معقد", "د": "بيضاوي"}, "answer": "أ" },
        { "text": "المستويات الفرعية (p) تتكون من كم مجال؟", "options": {"أ": "1", "ب": "3", "ج": "5", "د": "7"}, "answer": "ب" },
        { "text": "مبدأ ينص على أن كل إلكترون يشغل المستوى الأقل طاقة أولاً:", "options": {"أ": "مبدأ أوفباو", "ب": "مبدأ باولي", "ج": "قاعدة هوند", "د": "مبدأ هايزنبرج"}, "answer": "أ" },
        { "text": "عدد إلكترونات التكافؤ لعنصر المغنيسيوم Mg عدده الذري 12:", "options": {"أ": "1", "ب": "2", "ج": "3", "د": "4"}, "answer": "ب" },
        { "text": "عناصر المجموعة الواحدة لها نفس عدد:", "options": {"أ": "البروتونات", "ب": "النيوترونات", "ج": "إلكترونات التكافؤ", "د": "المدارات"}, "answer": "ج" },
        { "text": "تسمى عناصر المجموعة 1 في الجدول الدوري بـ:", "options": {"أ": "القلوية", "ب": "القلوية الأرضية", "ج": "الهالوجينات", "د": "الغازات النبيلة"}, "answer": "أ" },
        { "text": "تسمى عناصر المجموعة 17 بـ:", "options": {"أ": "الفلزات", "ب": "الهالوجينات", "ج": "اللانثانيدات", "د": "الأكتنيدات"}, "answer": "ب" },
        { "text": "أكثر العناصر كهروسالبية في الجدول الدوري:", "options": {"أ": "الكلور", "ب": "الفلور", "ج": "الأكسجين", "د": "النيتروجين"}, "answer": "ب" },
        { "text": "نصف المسافة بين نواتين متجاورتين في التركيب البلوري:", "options": {"أ": "نصف قطر الذرة", "ب": "طول الرابطة", "ج": "السالبية الكهربائية", "د": "طاقة التأين"}, "answer": "أ" },
        { "text": "الطاقة اللازمة لانتزاع إلكترون من ذرة العنصر في الحالة الغازية:", "options": {"أ": "طاقة التأين", "ب": "الكهروسالبية", "ج": "طاقة البلورة", "د": "الميل الإلكتروني"}, "answer": "أ" },
        { "text": "مدى قابلية ذرات العنصر على جذب الإلكترونات في الرابطة الكيميائية:", "options": {"أ": "طاقة التأين", "ب": "الكهروسالبية", "ج": "الميل الإلكتروني", "د": "نصف القطر"}, "answer": "ب" },
        { "text": "أكبر العناصر في نصف القطر الذري تقع في:", "options": {"أ": "أعلى يمين الجدول", "ب": "أسفل يسار الجدول", "ج": "وسط الجدول", "د": "أسفل يمين الجدول"}, "answer": "ب" },
        { "text": "قوة التجاذب بين أيون موجب وأيون سالب:", "options": {"أ": "الرابطة التساهمية", "ب": "الرابطة الأيونية", "ج": "الرابطة الفلزية", "د": "الرابطة الهيدروجينية"}, "answer": "ب" },
        { "text": "شحنة الأيون الكلية للمركب الأيوني تساوي دائماً:", "options": {"أ": "+1", "ب": "-1", "ج": "صفر", "د": "+2"}, "answer": "ج" },
        { "text": "الرابطة التي تنشأ من تداخل مستويات الطاقة الخارجية للفلزات:", "options": {"أ": "أيونية", "ب": "فلزية", "ج": "تساهمية", "د": "تناسقية"}, "answer": "ب" },
        { "text": "خاصية فيزيائية تمكن الفلزات من سحبها لأسلاك:", "options": {"أ": "الصلابة", "ب": "المطيلية", "ج": "القابلية للطرق", "د": "التوصيل"}, "answer": "ب" },
        { "text": "تتكون الرابطة التساهمية نتيجة:", "options": {"أ": "فقد إلكترونات", "ب": "اكتساب إلكترونات", "ج": "المشاركة بالإلكترونات", "د": "انتقال بروتونات"}, "answer": "ج" },
        { "text": "رابطة تساهمية تتكون من تداخل المستويات الفرعية بالرأس:", "options": {"أ": "سيجما (σ)", "ب": "باي (π)", "ج": "تناسقية", "د": "ثنائية"}, "answer": "أ" },
        { "text": "الرابطة سيجما أقوى من الرابطة باي لأن التداخل فيها يكون:", "options": {"أ": "بالرأس", "ب": "بالجنب", "ج": "طولي", "د": "دائري"}, "answer": "أ" },
        { "text": "نوع الرابطة في جزيء الماء H2O:", "options": {"أ": "تساهمية قطبية", "ب": "تساهمية غير قطبية", "ج": "أيونية", "د": "فلزية"}, "answer": "أ" },
        { "text": "خلط المستويات الفرعية لتكوين مستويات جديدة مهجنة:", "options": {"أ": "التأين", "ب": "التهجين", "ج": "التسامي", "د": "التبلور"}, "answer": "ب" },
        { "text": "نوع التهجين في جزيء الميثان CH4:", "options": {"أ": "sp", "ب": "sp2", "ج": "sp3", "د": "dsp2"}, "answer": "ج" },
        { "text": "شكل جزيء ثاني أكسيد الكربون CO2:", "options": {"أ": "منحني", "ب": "خطي", "ج": "هرمي", "د": "مثلث مستو"}, "answer": "ب" },
        { "text": "أقوى الروابط بين الجزيئات هي:", "options": {"أ": "قوى تشتت", "ب": "ثنائية القطب", "ج": "الرابطة الهيدروجينية", "د": "لندن"}, "answer": "ج" },
        { "text": "الرابطة الهيدروجينية تتكون عندما يرتبط الهيدروجين مع ذرة ذات كهروسالبية عالية مثل:", "options": {"أ": "الكربون", "ب": "الفلور أو الأكسجين", "ج": "الصوديوم", "د": "المغنيسيوم"}, "answer": "ب" },
        { "text": "قوى تجاذب ضعيفة تنشأ بين الجزيئات غير القطبية:", "options": {"أ": "قوى تشتت (لندن)", "ب": "هيدروجينية", "ج": "أيونية", "د": "فلزية"}, "answer": "أ" },
        { "text": "المادة الكيميائية التي تظهر في بداية التفاعل:", "options": {"أ": "النواتج", "ب": "المتفاعلات", "ج": "المحفزات", "د": "المذيبات"}, "answer": "ب" },
        { "text": "تفاعل تتحد فيه مادتان أو أكثر لتكوين مادة واحدة:", "options": {"أ": "تكوين", "ب": "تفكك", "ج": "إحلال بسيط", "د": "احتراق"}, "answer": "أ" },
        { "text": "تفاعل مادة مع الأكسجين وإنتاج طاقة وحرارة:", "options": {"أ": "تفكك", "ب": "احتراق", "ج": "تكوين", "د": "إحلال مزدوج"}, "answer": "ب" },
        { "text": "نوع التفاعل التالي: AB → A + B", "options": {"أ": "تكوين", "ب": "تفكك", "ج": "إحلال", "د": "احتراق"}, "answer": "ب" },
        { "text": "عدد جزيئات المادة يعبر عنه في المعادلة الكيميائية بـ:", "options": {"أ": "المعامل", "ب": "الأس", "ج": "الرمز", "د": "الحالة الفيزيائية"}, "answer": "أ" },
        { "text": "كتلة المتفاعلات تساوي كتلة النواتج، هذا نص قانون:", "options": {"أ": "حفظ الطاقة", "ب": "حفظ الكتلة", "ج": "النسب الثابتة", "د": "النسب المتضاعفة"}, "answer": "ب" },
        { "text": "عدد البروتونات في النواة يسمى العدد:", "options": {"أ": "الكتلي", "ب": "الذري", "ج": "النيوتروني", "د": "الأفوغادرو"}, "answer": "ب" },
        { "text": "أي الخواص التالية نوعية؟", "options": {"أ": "الكتلة", "ب": "الحجم", "ج": "الكثافة", "د": "الطول"}, "answer": "ج" },
        { "text": "تحول المادة من الحالة الصلبة إلى الحالة الغازية مباشرة:", "options": {"أ": "التبخر", "ب": "الانصهار", "ج": "التسامي", "د": "التكاثف"}, "answer": "ج" },
        { "text": "عند إضافة مادة غير متطايرة إلى مذيب نقي فإن درجة الغليان:", "options": {"أ": "تنخفض", "ب": "ترتفع", "ج": "لا تتغير", "د": "تتذبذب"}, "answer": "ب" },
        { "text": "أسرع العناصر تفاعلاً في المجموعة 17 هو:", "options": {"أ": "اليود", "ب": "البروم", "ج": "الكلور", "د": "الفلور"}, "answer": "د" },
        { "text": "تسمى الطاقة المخزنة في المادة نتيجة تركيبها:", "options": {"أ": "الطاقة الحركية", "ب": "طاقة الوضع الكيميائية", "ج": "الطاقة الحرارية", "د": "الطاقة الضوئية"}, "answer": "ب" },
        { "text": "المادة التي تزيد سرعة التفاعل دون أن تُستهلك:", "options": {"أ": "النواتج", "ب": "المثبطات", "ج": "المحفزات", "د": "المتفاعلات"}, "answer": "ج" },
        { "text": "أس الهيدروجين (pH) للمحاليل الحمضية يكون:", "options": {"أ": "أكبر من 7", "ب": "أصغر من 7", "ج": "يساوي 7", "د": "يساوي 14"}, "answer": "ب" },
        { "text": "المركب الذي يعد مثالاً على القواعد القوية:", "options": {"أ": "NaOH", "ب": "HCl", "ج": "H2O", "د": "NH3"}, "answer": "أ" },
        { "text": "الاحتراق يمثل تفاعل المادة مع:", "options": {"أ": "الهيدروجين", "ب": "الأكسجين", "ج": "النيتروجين", "د": "الكربون"}, "answer": "ب" }
    ];

    let currentIdx = 0; let score = 0; let log = [];

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        if(!name.trim()) return alert("لطفاً، أدخل اسمك قبل البدء.");
        document.getElementById('display-name').innerText = name;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if(currentIdx >= questions.length) return finishQuiz();
        
        const progress = (currentIdx / questions.length) * 100;
        document.getElementById('progress-bar').style.width = progress + "%";
        document.getElementById('q-counter').innerText = `${currentIdx + 1} / ${questions.length}`;
        
        const feedback = document.getElementById('feedback-box');
        feedback.style.display = 'none';
        feedback.className = 'feedback-box';
        document.getElementById('next-btn').style.display = 'none';
        
        const qData = questions[currentIdx];
        document.getElementById('q-text').innerText = qData.text;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        Object.entries(qData.options).forEach(([key, val]) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = `${key}) ${val}`;
            btn.onclick = () => handleAnswer(key);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selectedKey) {
        const qData = questions[currentIdx];
        const options = document.querySelectorAll('.option');
        const isCorrect = selectedKey === qData.answer;

        if(isCorrect) score++;
        log.push({
            q: qData.text,
            user: selectedKey + ") " + qData.options[selectedKey],
            correct: qData.answer + ") " + qData.options[qData.answer],
            status: isCorrect
        });

        options.forEach(opt => {
            opt.style.pointerEvents = 'none';
            const optKey = opt.innerText.split(')')[0];
            if(optKey === qData.answer) opt.classList.add('correct');
            else if(optKey === selectedKey) opt.classList.add('wrong');
        });

        const fb = document.getElementById('feedback-box');
        fb.classList.add(isCorrect ? 'fb-success' : 'fb-danger');
        document.getElementById('fb-title').innerText = isCorrect ? "إجابة صحيحة ✅" : "إجابة غير صحيحة ❌ الإجابة الصحيحة هي: " + qData.answer;
        fb.style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIdx++;
        showQuestion();
    }

    function finishQuiz() {
        document.getElementById('progress-bar').style.width = "100%";
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-title').innerText = `تقرير الطالب: ${document.getElementById('student-name').value}`;
        document.getElementById('res-score').innerText = `درجتك: ${score} من ${questions.length}`;
        
        const perc = (score / questions.length) * 100;
        let eval = perc >= 90 ? "أداء مبهر! استعد لدرجة الـ 100 بإذن الله 🌟" : perc >= 70 ? "رائع، مجهود متميز في الكيمياء ✨" : "تحتاج لمراجعة أنواع التفاعلات ووزن المعادلات 📚";
        document.getElementById('res-eval').innerText = eval;

        const body = document.getElementById('summary-body');
        log.forEach((item, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${item.q}</td><td style="color:${item.status?'#16a34a':'#dc2626'}; font-weight:bold;">${item.user}</td><td style="color:#16a34a; font-weight:bold;">${item.correct}</td><td>${item.status?'✅':'❌'}</td></tr>`;
        });
    }
</script>
</body>
</html>
