<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار كيمياء تحصيلي - القسم الخامس</title>
    <style>
        :root { --bg: #f8fafc; --panel: #ffffff; --light-blue: #e0f2fe; --primary: #0284c7; --success: #16a34a; --danger: #dc2626; --accent: #0369a1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 1000px; margin: 20px auto; background: var(--panel); border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        
        .header-brand { 
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); 
            padding: 25px; 
            text-align: center;
            color: white;
            font-weight: bold;
        }
        .header-brand h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .header-brand p { margin: 5px 0 0; font-size: 16px; opacity: 0.9; }

        .welcome-screen { padding: 50px 20px; text-align: center; }
        .welcome-screen h2 { color: #0f172a; margin-bottom: 10px; }
        .welcome-screen p { color: #64748b; margin-bottom: 30px; font-size: 18px; }
        
        input[type="text"] { width: 65%; padding: 16px; border: 2px solid #cbd5e1; border-radius: 15px; font-size: 18px; text-align: center; outline: none; margin-bottom: 20px; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--light-blue); }

        .quiz-screen { display: none; padding: 30px; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; font-weight: bold; background: #f1f5f9; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        
        .progress-container { width: 100%; height: 10px; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }

        .q-card { background: #fff; padding: 10px; border-radius: 15px; margin-bottom: 25px; }
        .q-text { font-size: 22px; font-weight: bold; color: #0f172a; line-height: 1.6; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) { .options-grid { grid-template-columns: 1fr; } }
        
        .option { padding: 18px; background: #fff; border: 2px solid #e2e8f0; border-radius: 15px; cursor: pointer; transition: 0.2s; font-size: 18px; text-align: right; position: relative; }
        .option:hover { border-color: var(--primary); background: #f0f9ff; transform: scale(1.01); }
        .correct { background: var(--success) !important; color: white; border-color: var(--success) !important; }
        .wrong { background: var(--danger) !important; color: white; border-color: var(--danger) !important; }

        .feedback-box { margin-top: 25px; padding: 20px; border-radius: 15px; display: none; border: 2px solid; text-align: center; font-weight: bold; font-size: 18px; }
        .fb-success { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        .fb-danger { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 16px 50px; border-radius: 15px; cursor: pointer; font-size: 19px; font-weight: bold; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn:hover { background: var(--accent); transform: translateY(-2px); }
        #next-btn { background: #334155; display: none; margin-top: 20px; }

        #result-screen { display:none; padding: 30px; }
        .summary-table-container { max-height: 500px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 15px; margin-top: 20px; }
        .summary-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
        .summary-table th, .summary-table td { padding: 12px; border: 1px solid #e2e8f0; text-align: right; }
        .summary-table th { background: #f1f5f9; color: #475569; position: sticky; top: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-brand">
        <h1>اختبار كيمياء تحصيلي تجريبي</h1>
        <p>القسم الخامس: الحسابات الكيميائية</p>
    </div>

    <div id="start-screen" class="welcome-screen">
        <h2>مرحباً بك أيها المبدع/ة 💡</h2>
        <p>القسم الخامس يركز على الحسابات الكيميائية، المولات، الصيغ الأولية والجزيئية والمردود المئوي</p>
        <input type="text" id="student-name" placeholder="فضلاً، أدخل اسمك الثلاثي للبدء">
        <br>
        <button class="btn" onclick="startQuiz()">بدء الاختبار 🚀</button>
    </div>

    <div id="quiz-screen" class="quiz-screen">
        <div class="stats-bar">
            <span>👤 المختبر: <span id="display-name" style="color:var(--primary)"></span></span>
            <span>📝 السؤال: <span id="q-counter"></span></span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="q-card">
            <div class="q-text" id="q-text"></div>
        </div>
        <div class="options-grid" id="options-container"></div>
        <div id="feedback-box" class="feedback-box">
            <span id="fb-title"></span>
        </div>
        <div style="text-align: center;">
            <button id="next-btn" class="btn" onclick="nextQuestion()">السؤال التالي ⮕</button>
        </div>
    </div>

    <div id="result-screen">
        <div style="text-align:center;">
            <h2 id="res-title"></h2>
            <div id="res-score" style="font-size: 38px; font-weight: 900; color: var(--primary); margin: 20px;"></div>
            <p id="res-eval" style="font-size: 18px; color: #64748b;"></p>
        </div>
        <hr style="border:0; border-top:1px solid #e2e8f0; margin: 30px 0;">
        <h3>📊 مراجعة الأداء التفصيلية:</h3>
        <div class="summary-table-container">
            <table class="summary-table">
                <thead>
                    <tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الإجابة الصحيحة</th><th>النتيجة</th></tr>
                </thead>
                <tbody id="summary-body"></tbody>
            </table>
        </div>
        <div style="text-align:center; margin-top:40px;">
            <button class="btn" onclick="location.reload()">محاولة مرة أخرى 🔄</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { "text": "دراسة العلاقة بين المواد المتفاعلة والمواد الناتجة في التفاعل الكيميائي من خلال:", "options": {"أ": "الحسابات الكيميائية", "ب": "المعادلات الكيميائية", "ج": "النسب المولية", "د": "المادة المحددة"}, "answer": "أ" },
        { "text": "وحدة قياس كمية المادة:", "options": {"أ": "مول", "ب": "الكندل", "ج": "المتر", "د": "الثانية"}, "answer": "أ" },
        { "text": "قيمة ثابت أفوجادرو:", "options": {"أ": "6.02 × 10^23", "ب": "6.03 × 10^23", "ج": "6.02 × 10^22", "د": "6.03 × 10^22"}, "answer": "أ" },
        { "text": "عدد مولات 1.5x10^23 جزيء من SO2 يساوي (عدد أفوجادرو = 6.02x10^23):", "options": {"أ": "9 mol", "ب": "4 mol", "ج": "0.15 mol", "د": "0.25 mol"}, "answer": "د" },
        { "text": "عدد مولات 21g من الليثيوم يساوي (علماً أن كتلته المولية 7 g/mol):", "options": {"أ": "0.33", "ب": "3", "ج": "7", "د": "147"}, "answer": "ب" },
        { "text": "احسب الكتلة بالجرام لعنصر K إذا علمت أن عدد مولاته 2mol وكتلته المولية 39 g/mol:", "options": {"أ": "19.5", "ب": "39", "ج": "78", "د": "87"}, "answer": "ج" },
        { "text": "كم تبلغ عدد مولات 20g من ذرة البروم Br؟ (الكتلة المولية للبروم 80 g/mol):", "options": {"أ": "40", "ب": "4", "ج": "2.5", "د": "0.25"}, "answer": "د" },
        { "text": "أوجد عدد المولات لمركب كتلته 120g والكتلة المولية له 30g/mol:", "options": {"أ": "4", "ب": "3", "ج": "6", "د": "2"}, "answer": "أ" },
        { "text": "إذا كان مول واحد من مادة ما يحتوي على 17g، فكم مول يحتوي 34g من هذه المادة؟", "options": {"أ": "0.5 mol", "ب": "2 mol", "ج": "17 mol", "د": "34 mol"}, "answer": "ب" },
        { "text": "أي المركبات التالية أقل كتلة مولية؟ (علماً أن: O=16, C=12, H=1):", "options": {"أ": "CH4", "ب": "CO2", "ج": "H2O", "د": "H2O2"}, "answer": "أ" },
        { "text": "الكتلة المولية بوحدة g/mol لـ CH3COOH (الأوزان الذرية: C=12, H=1, O=16) تساوي:", "options": {"أ": "10", "ب": "30", "ج": "90", "د": "60"}, "answer": "د" },
        { "text": "احسب عدد مولات 20g من NaOH (الكتل الذرية: Na=23, O=16, H=1):", "options": {"أ": "0.25 mol", "ب": "0.5 mol", "ج": "0.75 mol", "د": "1.0 mol"}, "answer": "ب" },
        { "text": "احسب كتلة 0.5 mol من الأمونيا NH3 (الكتل الذرية: N=14, H=1):", "options": {"أ": "7.5 g", "ب": "8.5 g", "ج": "17 g", "د": "34 g"}, "answer": "ب" },
        { "text": "ما كتلة 0.25 mol من الماء بوحدة الجرام؟ (الكتل الذرية: H=1, O=16):", "options": {"أ": "18", "ب": "16", "ج": "9", "د": "4.5"}, "answer": "د" },
        { "text": "عدد المولات الموجودة في 36 جرام من الماء يساوي؟ (H=1, O=16):", "options": {"أ": "0.5 mol", "ب": "5 mol", "ج": "6 mol", "د": "2 mol"}, "answer": "د" },
        { "text": "أبسط نسبة عددية صحيحة لعدد مولات العناصر بالمركب:", "options": {"أ": "الصيغة الجزيئية", "ب": "الصيغة الأولية", "ج": "الصيغة البنائية", "د": "الصيغة العددية"}, "answer": "ب" },
        { "text": "الصيغة التي تحدد العدد الفعلي للذرات في المركب:", "options": {"أ": "الجزيئية", "ب": "الفرضية", "ج": "النظرية", "د": "الأولية"}, "answer": "أ" },
        { "text": "مركب يحتوي على عدد محدد من جزيئات الماء المرتبطة بذراته:", "options": {"أ": "الملح المائي", "ب": "المركب الأيوني", "ج": "المخلوط", "د": "الراسب"}, "answer": "أ" },
        { "text": "ما كتلة الماء في عينة ملح مائي كتلتها 10g أصبحت بعد التسخين 8.2g؟", "options": {"أ": "1.8g", "ب": "18.2g", "ج": "8.2g", "د": "10g"}, "answer": "أ" },
        { "text": "المادة التي تستهلك تماماً في التفاعل وتحدد كمية المادة الناتجة:", "options": {"أ": "المادة الفائضة", "ب": "المادة المحددة للتفاعل", "ج": "المحفزات", "د": "النواتج"}, "answer": "ب" },
        { "text": "أكبر كمية من المادة الناتجة يمكن الحصول عليها من المادة المتفاعلة (نظرياً):", "options": {"أ": "المردود النظري", "ب": "المردود الفعلي", "ج": "نسبة المردود المئوية", "د": "الكتلة المولية"}, "answer": "أ" },
        { "text": "نسبة المردود الفعلي إلى المردود النظري في صورة نسبة مئوية:", "options": {"أ": "نسبة المردود المئوية", "ب": "المردود النظري", "ج": "الثابت الكيميائي", "د": "الكسر المولي"}, "answer": "أ" },
        { "text": "كمية المادة الناتجة عند إجراء التفاعل الكيميائي عملياً:", "options": {"أ": "المردود النظري", "ب": "المردود الفعلي", "ج": "الكتلة الذرية", "د": "عدد أفوغادرو"}, "answer": "ب" }
    ];

    let currentIdx = 0; let score = 0; let log = [];

    function startQuiz() {
        const name = document.getElementById('student-name').value;
        if(!name.trim()) return alert("لطفاً، أدخل اسمك قبل البدء.");
        document.getElementById('display-name').innerText = name;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if(currentIdx >= questions.length) return finishQuiz();
        
        const progress = (currentIdx / questions.length) * 100;
        document.getElementById('progress-bar').style.width = progress + "%";
        document.getElementById('q-counter').innerText = `${currentIdx + 1} / ${questions.length}`;
        
        const feedback = document.getElementById('feedback-box');
        feedback.style.display = 'none';
        feedback.className = 'feedback-box';
        document.getElementById('next-btn').style.display = 'none';
        
        const qData = questions[currentIdx];
        document.getElementById('q-text').innerText = qData.text;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        Object.entries(qData.options).forEach(([key, val]) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = `${key}) ${val}`;
            btn.onclick = () => handleAnswer(key);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selectedKey) {
        const qData = questions[currentIdx];
        const options = document.querySelectorAll('.option');
        const isCorrect = selectedKey === qData.answer;

        if(isCorrect) score++;
        log.push({
            q: qData.text,
            user: selectedKey + ") " + qData.options[selectedKey],
            correct: qData.answer + ") " + qData.options[qData.answer],
            status: isCorrect
        });

        options.forEach(opt => {
            opt.style.pointerEvents = 'none';
            const optKey = opt.innerText.split(')')[0];
            if(optKey === qData.answer) opt.classList.add('correct');
            else if(optKey === selectedKey) opt.classList.add('wrong');
        });

        const fb = document.getElementById('feedback-box');
        fb.classList.add(isCorrect ? 'fb-success' : 'fb-danger');
        document.getElementById('fb-title').innerText = isCorrect ? "إجابة صحيحة ✅" : "إجابة غير صحيحة ❌ الإجابة الصحيحة هي: " + qData.answer;
        fb.style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentIdx++;
        showQuestion();
    }

    function finishQuiz() {
        document.getElementById('progress-bar').style.width = "100%";
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-title').innerText = `تقرير الطالب: ${document.getElementById('student-name').value}`;
        document.getElementById('res-score').innerText = `درجتك: ${score} من ${questions.length}`;
        
        const perc = (score / questions.length) * 100;
        let eval = perc >= 90 ? "أداء استثنائي! أنت مستعد تماماً للحسابات الكيميائية 🌟" : perc >= 70 ? "ممتاز، لديك أساس قوي في هذا القسم ✨" : "بداية جيدة، يفضل مراجعة قوانين المول والمردود المئوي 📚";
        document.getElementById('res-eval').innerText = eval;

        const body = document.getElementById('summary-body');
        log.forEach((item, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${item.q}</td><td style="color:${item.status?'#16a34a':'#dc2626'}; font-weight:bold;">${item.user}</td><td style="color:#16a34a; font-weight:bold;">${item.correct}</td><td>${item.status?'✅':'❌'}</td></tr>`;
        });
    }
</script>
</body>
</html>
